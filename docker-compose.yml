version: '3.8'

services:
  db:
    image: postgres:18
    container_name: postgres-advpro
    environment:
      POSTGRES_DB: advpro-2024
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: my-password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  postgres_data: